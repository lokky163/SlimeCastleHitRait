<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit Rate Calculator</title>
    
    <!-- Глобальные стили -->
    <link rel="stylesheet" href="styles/style.css">
    
    <!-- Тема по умолчанию (светлая) -->
    <link rel="stylesheet" href="styles/themes/light/style.css" id="themeStylesheet">
</head>
<body>
    <!-- Панель управления -->
    <header class="control-panel">
        <div class="control-row">
            <!-- Выбор босса -->
            <div class="control-group">
                <label class="control-label" data-i18n="target">Цель:</label>
                <div class="boss-select-wrapper">
                    <select id="bossSelect" class="control-select"></select>
                    <!-- <img id="bossIcon" class="boss-icon" src="" alt="" style="display: none;"> -->
                </div>
            </div>
            
            <!-- Уворот босса -->
            <div class="control-group">
                <label class="control-label" data-i18n="boss_dodge">Уворот босса:</label>
                <input type="number" id="dodgeInput" class="control-input" value="400" min="0">
            </div>
            
            <!-- Точность пользователя -->
            <div class="control-group">
                <label class="control-label" data-i18n="your_acc">Ваша точность:</label>
                <input type="number" id="accInput" class="control-input" value="2000" min="0">
            </div>
            
            <!-- Скорость атаки пользователя -->
            <div class="control-group">
                <label class="control-label" data-i18n="your_aspd">Ваша скорость атаки:</label>
                <input type="number" id="aspdInput" class="control-input" value="7.2" min="0" step="0.1">
            </div>
            
            <!-- Выбор формулы -->
            <div class="control-group">
                <label class="control-label" data-i18n="calc_formula">Формула расчёта:</label>
                <select id="calcModeSelect" class="control-select">
                    <option value="mode1" data-i18n="formula_abs">Абсолютная прибавка</option>
                    <option value="mode2" data-i18n="formula_rel">Относительная прибавка</option>
                </select>
            </div>
            
            <!-- Переключатели темы и языка -->
            <div class="control-group theme-lang-switchers">
                <button id="langSwitchBtn" class="icon-btn" title="Сменить язык">
                    <img src="lang/ru/icon.png" alt="Язык" id="langIcon">
                </button>
                <button id="themeSwitchBtn" class="icon-btn" title="Сменить тему">
                    <img src="styles/themes/light/icon.png" alt="Тема" id="themeIcon">
                </button>
            </div>
        </div>
        
        <!-- Информационная строка -->
        <div class="info-row">
            <div class="formula-display" id="formulaDisplay" data-i18n="formula_abs_display">
                Шанс попадания = Точность / (Точность + Уворот) + 0.1
            </div>
        </div>
        
        <!-- Предупреждения и подсказки -->
        <div class="warnings-row">
            <div class="warning-item" data-i18n="warning_accuracy">
                Значения уворотов боссов не окончательные, не стоит доверять этим значениям на 100%
            </div>
        </div>
    </header>
    
    <!-- Основная область с таблицей и графиком -->
    <main class="main-content">
        <!-- Таблица статистики -->
        <div class="table-wrapper">
            <table id="statsTable" class="stats-table">
                <tr id="rowMiss">
                    <th data-i18n="table_miss_percent">% Промахов</th>
                    <td id="currentMiss" class="current-value">0.0%</td>
                    <!-- Значения будут заполняться динамически -->
                </tr>
                <tr id="rowHit">
                    <th data-i18n="table_hit_percent">% Попаданий</th>
                    <td id="currentHit" class="current-value">0.0%</td>
                </tr>
                <tr id="rowMissCount">
                    <th data-i18n="table_miss_count">Кол-во промахов</th>
                    <td id="currentMissCount" class="current-value">0</td>
                </tr>
                <tr id="rowAcc">
                    <th data-i18n="table_accuracy">Точность</th>
                    <td id="currentAcc" class="current-value">2000</td>
                </tr>
            </table>
        </div>
        
        <!-- Интерактивный график -->
        <div class="chart-wrapper">
            <canvas id="hitChart"></canvas>
        </div>
    </main>

    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
